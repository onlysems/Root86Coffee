name: Regenerate SEO pages

on:
  push:
    branches: [main]
    paths:
      - 'js/coffees.js'
      - '_tools/generate_seo.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Regenerate SEO pages and sitemap
        run: python _tools/generate_seo.py

      - name: Commit regenerated pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add coffees/ origins/ sitemap.xml green-coffee-*.html
          if git diff --staged --quiet; then
            echo "No SEO changes"
          else
            git commit -m "Auto-regenerate SEO pages [skip ci]"
            git push
          fi
